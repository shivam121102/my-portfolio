<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Shivam Rajput</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .contact-container {
      background: rgba(255,255,255,0.05);
      padding: 40px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 100%;
      animation: fadeIn 1.2s ease-in-out;
    }

    h1 {
      text-align: center;
      color: #ff6f61;
      margin-bottom: 25px;
      font-size: 2.2rem;
      animation: glow 2s infinite alternate;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    input {
      padding: 12px 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 1rem;
      transition: 0.3s;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    input:focus {
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 10px #ff6f61;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: 600;
      background: #ff6f61;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff3b2e;
      transform: scale(1.05);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(50px);} to { opacity: 1; transform: translateY(0);} }
    @keyframes glow { from { text-shadow: 0 0 10px #ff6f61,0 0 20px #ff6f61;} to { text-shadow: 0 0 20px #fad0c4,0 0 40px #fad0c4; } }

    .back-btn {
      display: block;
      text-align: center;
      margin-top: 25px;
      text-decoration: none;
      padding: 12px 25px;
      border-radius: 25px;
      background: #ff6f61;
      color: #fff;
      font-weight: 600;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #ff3b2e;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="contact-container">
    <h1>Contact Me</h1>
    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <input type="tel" id="number" placeholder="Your Number" required>
      <button type="submit">Submit</button>
    </form>
    <a href="portfolio.html" class="back-btn">⬅ Back to Home</a>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', function(e){
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const number = document.getElementById('number').value.trim();

      if(!name || !email || !number){
        alert('Please fill all fields!');
        return;
      }

      // WhatsApp link format
      const phone = '917206171429'; // Your WhatsApp number with country code
      const message = `Hello Shivam,%0AName: ${encodeURIComponent(name)}%0AEmail: ${encodeURIComponent(email)}%0ANumber: ${encodeURIComponent(number)}`;
      const url = `https://wa.me/${phone}?text=${message}`;

      window.open(url, '_blank');
    });
  </script>

</body>
</html>
